---
layout: default
---

{%-include back_link.html-%}

<article>
  <p class="post-meta">
    <time datetime="{{ page.date }}">{{ page.date | date: site.theme_config.date_format }}</time>
  </p>
  
  <h1 {% if page.title_color %}style="color: var(--{{ page.title_color }});"{% endif %}>
    {{ page.title }}
  </h1>

  {{ content }}
</article>
